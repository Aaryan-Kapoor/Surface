<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 420" width="1600" height="420" role="img" aria-label="Surface — the universal display for AI agents. An agent pushes content from a terminal; clicks flow back.">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="90%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="discGlass" cx="30%" cy="-10%" r="120%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.055"/>
    </pattern>
    <marker id="arrow" viewBox="0 0 8 8" refX="6.5" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0.5 0.5 L7 4 L0.5 7.5" fill="none" stroke="#ffffff" stroke-opacity="0.7" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <clipPath id="discClip"><circle cx="1378" cy="210" r="124"/></clipPath>
  </defs>

  <!-- void -->
  <rect width="1600" height="420" fill="#000000"/>
  <rect width="1600" height="420" fill="url(#dots)"/>
  <rect width="1600" height="420" fill="url(#glow)"/>

  <!-- star specks -->
  <g fill="#ffffff">
    <circle cx="118" cy="64" r="1.1" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.12;0.5" dur="4.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="372" cy="350" r="0.9" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.08;0.3" dur="5.6s" repeatCount="indefinite" begin="1.2s"/>
    </circle>
    <circle cx="700" cy="84" r="1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="4.8s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="838" cy="332" r="0.8" opacity="0.25"/>
    <circle cx="1043" cy="58" r="1" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="5.1s" repeatCount="indefinite" begin="2s"/>
    </circle>
    <circle cx="1538" cy="96" r="1.1" opacity="0.45">
      <animate attributeName="opacity" values="0.45;0.12;0.45" dur="4.4s" repeatCount="indefinite" begin="0.9s"/>
    </circle>
    <circle cx="1490" cy="372" r="0.9" opacity="0.3"/>
    <circle cx="56" cy="300" r="0.9" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.08;0.3" dur="6s" repeatCount="indefinite" begin="2.6s"/>
    </circle>
  </g>

  <!-- ───────── wordmark ───────── -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">
    <text x="96" y="196" font-size="96" font-weight="650" letter-spacing="-3" fill="#ffffff">Surface</text>
    <text x="100" y="240" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="13" letter-spacing="7" fill="#ffffff" fill-opacity="0.45">THE UNIVERSAL DISPLAY FOR AI AGENTS</text>

    <!-- prompt line -->
    <g font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
      <text x="100" y="304" fill="#ffffff" fill-opacity="0.3">›</text>
      <text x="118" y="304" fill="#ffffff" fill-opacity="0.78">surface me a pomodoro</text>
      <rect x="318" y="291" width="8" height="16" fill="#ffffff" opacity="0.8">
        <animate attributeName="opacity" values="0.8;0.8;0;0" keyTimes="0;0.55;0.56;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="100" y="344" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="11" letter-spacing="4" fill="#ffffff" fill-opacity="0.28">ONE DISPLAY · EVERY AGENT · SELF-HOSTED</text>
  </g>

  <!-- ───────── terminal card ───────── -->
  <g>
    <rect x="868" y="118" width="316" height="184" rx="8" fill="#060606" stroke="#ffffff" stroke-opacity="0.22"/>
    <!-- title bar -->
    <line x1="868" y1="150" x2="1184" y2="150" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="890" cy="134" r="4" fill="none" stroke="#ffffff" stroke-opacity="0.3"/>
    <circle cx="906" cy="134" r="4" fill="none" stroke="#ffffff" stroke-opacity="0.2"/>
    <circle cx="922" cy="134" r="4" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="1162" y="138" text-anchor="end" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="2" fill="#ffffff" fill-opacity="0.3">AGENT</text>

    <g font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="12.5">
      <text x="890" y="178" fill="#ffffff" fill-opacity="0.35">$</text>
      <text x="904" y="178" fill="#ffffff" fill-opacity="0.85">surface ask "Ship it?" --wait</text>
      <text x="890" y="204" fill="#ffffff" fill-opacity="0.35">$</text>
      <text x="904" y="204" fill="#ffffff" fill-opacity="0.85">make | surface append build -</text>
      <text x="890" y="230" fill="#ffffff" fill-opacity="0.35">$</text>
      <text x="904" y="230" fill="#ffffff" fill-opacity="0.85">surface open dash --on tv</text>
      <text x="890" y="262" fill="#ffffff" fill-opacity="0.45">⏎ waiting for the user
        <animate attributeName="fill-opacity" values="0.45;0.18;0.45" dur="2.4s" repeatCount="indefinite"/>
      </text>
      <rect x="890" y="272" width="8" height="14" fill="#ffffff" opacity="0.7">
        <animate attributeName="opacity" values="0.7;0.7;0;0" keyTimes="0;0.55;0.56;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <!-- ───────── flow: push (terminal → disc) ───────── -->
  <path id="pushPath" d="M 1192 158 C 1248 132, 1294 128, 1342 150" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.2" stroke-dasharray="5 7" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="48" to="0" dur="1.6s" repeatCount="indefinite"/>
  </path>
  <circle r="2.4" fill="#ffffff" opacity="0.9">
    <animateMotion dur="1.6s" repeatCount="indefinite" path="M 1192 158 C 1248 132, 1294 128, 1342 150"/>
  </circle>
  <text x="1240" y="108" text-anchor="middle" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="3" fill="#ffffff" fill-opacity="0.45">PUSH</text>

  <!-- ───────── flow: actions (disc → terminal) ───────── -->
  <path id="backPath" d="M 1330 296 C 1288 322, 1244 326, 1196 304" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.2" stroke-dasharray="5 7" marker-end="url(#arrow)">
    <animate attributeName="stroke-dashoffset" from="48" to="0" dur="1.6s" repeatCount="indefinite" begin="0.8s"/>
  </path>
  <circle r="2.4" fill="#ffffff" opacity="0.9">
    <animateMotion dur="1.6s" repeatCount="indefinite" begin="0.8s" path="M 1330 296 C 1288 322, 1244 326, 1196 304"/>
  </circle>
  <text x="1264" y="350" text-anchor="middle" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace" font-size="10" letter-spacing="3" fill="#ffffff" fill-opacity="0.45">CLICKS FLOW BACK</text>

  <!-- ───────── porthole surface ───────── -->
  <g>
    <!-- listening ring -->
    <circle cx="1378" cy="210" r="134" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="3 9">
      <animateTransform attributeName="transform" type="rotate" from="0 1378 210" to="360 1378 210" dur="22s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1378" cy="210" r="124" fill="#ffffff"/>
    <g clip-path="url(#discClip)" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Helvetica, Arial, sans-serif">
      <text x="1378" y="186" text-anchor="middle" font-size="21" font-weight="650" fill="#000000">Ship it?</text>
      <text x="1378" y="210" text-anchor="middle" font-size="11" fill="#000000" fill-opacity="0.45">release v2.4.0 · build green</text>
      <!-- Ship button -->
      <g>
        <rect x="1290" y="232" width="84" height="34" fill="#000000"/>
        <text x="1332" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Ship</text>
        <animate attributeName="opacity" values="1;0.75;1" dur="2.4s" repeatCount="indefinite"/>
      </g>
      <!-- Hold button -->
      <rect x="1382" y="232" width="84" height="34" fill="none" stroke="#000000" stroke-opacity="0.35"/>
      <text x="1424" y="254" text-anchor="middle" font-size="13" font-weight="600" fill="#000000" fill-opacity="0.75">Hold</text>
      <!-- glass highlight -->
      <circle cx="1378" cy="210" r="124" fill="url(#discGlass)"/>
    </g>
    <circle cx="1378" cy="210" r="124" fill="none" stroke="#ffffff" stroke-opacity="0.25"/>

    <!-- live pill -->
    <g font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace">
      <rect x="1336" y="86" width="84" height="22" rx="11" fill="#000000" stroke="#ffffff" stroke-opacity="0.35"/>
      <circle cx="1352" cy="97" r="3" fill="#ffffff">
        <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <text x="1364" y="101" font-size="9.5" letter-spacing="2.5" fill="#ffffff">LIVE</text>
    </g>
  </g>
</svg>
