<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pac-Man</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #000; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  canvas {
    width: 100%; height: 100%;
    max-width: 360px; max-height: 360px;
    aspect-ratio: 1;
  }
</style>
</head>
<body>
<canvas id="game" width="360" height="360"></canvas>
<script>
(() => {
  const ctx = document.getElementById("game").getContext("2d");
  const MAZE_TEMPLATE = [
    "###############",
    "#.............#",
    "#.###.###.###.#",
    "#.#.........#.#",
    "#.#.###.###.#.#",
    "#.....#.#.....#",
    "#.###.#.#.###.#",
    "#.#.........#.#",
    "#.###.#.#.###.#",
    "#.....#.#.....#",
    "#.#.###.###.#.#",
    "#.#.........#.#",
    "#.###.###.###.#",
    "#.............#",
    "###############",
  ];
  const ROWS = MAZE_TEMPLATE.length;
  const COLS = MAZE_TEMPLATE[0].length;
  const CELL = 360 / COLS;
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];

  let grid, pac, ghosts;

  const reset = () => {
    grid = MAZE_TEMPLATE.map((row) => row.split(""));
    pac = { x: 1, y: 1, fromX: 1, fromY: 1, dir: 1, mouth: 0 };
    ghosts = [
      { x: 7, y: 3,  fromX: 7,  fromY: 3,  dir: 2, color: "#FF1744" },
      { x: 3, y: 7,  fromX: 3,  fromY: 7,  dir: 1, color: "#F8BBD0" },
      { x: 11, y: 7, fromX: 11, fromY: 7, dir: 3, color: "#00E5FF" },
      { x: 7, y: 11, fromX: 7,  fromY: 11, dir: 0, color: "#FFAB40" },
    ];
  };

  const isWall = (x, y) => {
    if (y < 0 || y >= ROWS || x < 0 || x >= COLS) return true;
    return grid[y][x] === "#";
  };

  const ghostDist = (x, y) => {
    let min = Infinity;
    for (const g of ghosts) {
      const d = Math.abs(x - g.x) + Math.abs(y - g.y);
      if (d < min) min = d;
    }
    return min;
  };

  const lookaheadDots = (x, y, d, depth) => {
    let dots = 0;
    let cx = x, cy = y;
    for (let i = 0; i < depth; i++) {
      cx += DX[d]; cy += DY[d];
      if (isWall(cx, cy)) break;
      if (grid[cy][cx] === ".") dots++;
    }
    return dots;
  };

  const pickPacDir = () => {
    const opts = [];
    for (let d = 0; d < 4; d++) {
      const nx = pac.x + DX[d];
      const ny = pac.y + DY[d];
      if (isWall(nx, ny)) continue;
      const gd = ghostDist(nx, ny);
      if (gd === 0) continue;
      let s = grid[ny][nx] === "." ? 10 : 1;
      if (d === pac.dir) s += 3;
      if (d === (pac.dir + 2) % 4) s -= 5;
      if (gd === 1) s -= 30;
      else if (gd === 2) s -= 10;
      else s += Math.min(gd, 6);
      s += lookaheadDots(pac.x, pac.y, d, 4);
      opts.push({ d, s });
    }
    if (opts.length === 0) return (pac.dir + 2) % 4;
    opts.sort((a, b) => b.s - a.s);
    if (opts.length > 1 && Math.random() < 0.1) return opts[1].d;
    return opts[0].d;
  };

  const pickGhostDir = (g) => {
    const valid = [];
    for (let d = 0; d < 4; d++) {
      if (d === (g.dir + 2) % 4) continue;
      const nx = g.x + DX[d];
      const ny = g.y + DY[d];
      if (!isWall(nx, ny)) valid.push(d);
    }
    if (valid.length === 0) return (g.dir + 2) % 4;
    valid.sort((a, b) => {
      const da = Math.abs(g.x + DX[a] - pac.x) + Math.abs(g.y + DY[a] - pac.y);
      const db = Math.abs(g.x + DX[b] - pac.x) + Math.abs(g.y + DY[b] - pac.y);
      return da - db;
    });
    return Math.random() < 0.4 ? valid[0] : valid[Math.floor(Math.random() * valid.length)];
  };

  const step = () => {
    pac.fromX = pac.x;
    pac.fromY = pac.y;
    pac.dir = pickPacDir();
    pac.x += DX[pac.dir];
    pac.y += DY[pac.dir];
    pac.mouth = (pac.mouth + 1) % 4;
    if (grid[pac.y][pac.x] === ".") grid[pac.y][pac.x] = " ";
    if (!grid.some((r) => r.includes("."))) { reset(); return; }

    for (const g of ghosts) {
      g.fromX = g.x;
      g.fromY = g.y;
      g.dir = pickGhostDir(g);
      g.x += DX[g.dir];
      g.y += DY[g.dir];
    }
    // collision: either same cell, or swap (cross-through)
    for (const g of ghosts) {
      const same = g.x === pac.x && g.y === pac.y;
      const swap = g.x === pac.fromX && g.y === pac.fromY && g.fromX === pac.x && g.fromY === pac.y;
      if (same || swap) { reset(); return; }
    }
  };

  const drawWalls = () => {
    ctx.strokeStyle = "#2A6FF6";
    ctx.lineWidth = 2;
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (grid[y][x] !== "#") continue;
        const px = x * CELL, py = y * CELL;
        if (!isWall(x, y - 1)) { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px + CELL, py); ctx.stroke(); }
        if (!isWall(x, y + 1)) { ctx.beginPath(); ctx.moveTo(px, py + CELL); ctx.lineTo(px + CELL, py + CELL); ctx.stroke(); }
        if (!isWall(x - 1, y)) { ctx.beginPath(); ctx.moveTo(px, py); ctx.lineTo(px, py + CELL); ctx.stroke(); }
        if (!isWall(x + 1, y)) { ctx.beginPath(); ctx.moveTo(px + CELL, py); ctx.lineTo(px + CELL, py + CELL); ctx.stroke(); }
      }
    }
  };

  const drawDots = () => {
    ctx.fillStyle = "#FFE082";
    for (let y = 0; y < ROWS; y++) {
      for (let x = 0; x < COLS; x++) {
        if (grid[y][x] !== ".") continue;
        ctx.beginPath();
        ctx.arc(x * CELL + CELL / 2, y * CELL + CELL / 2, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  };

  const interpCenter = (entity, interp) => ({
    cx: (entity.fromX + (entity.x - entity.fromX) * interp) * CELL + CELL / 2,
    cy: (entity.fromY + (entity.y - entity.fromY) * interp) * CELL + CELL / 2,
  });

  const drawPac = (interp) => {
    const { cx, cy } = interpCenter(pac, interp);
    const r = CELL / 2 - 1;
    const mouthOpen = pac.mouth < 2 ? 0.28 : 0.06;
    const dirAngle = [Math.PI * 1.5, 0, Math.PI * 0.5, Math.PI][pac.dir];
    ctx.fillStyle = "#FFEB3B";
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, dirAngle + mouthOpen * Math.PI, dirAngle + (2 - mouthOpen) * Math.PI);
    ctx.closePath();
    ctx.fill();
  };

  const drawGhost = (g, interp) => {
    const { cx, cy } = interpCenter(g, interp);
    const r = CELL / 2 - 1;
    const baseY = cy + r;
    const bumps = 3;
    const seg = (2 * r) / bumps;
    const dip = r * 0.28;

    ctx.fillStyle = g.color;
    ctx.beginPath();
    ctx.arc(cx, cy, r, Math.PI, 0);
    ctx.lineTo(cx + r, baseY);
    for (let i = 1; i <= bumps; i++) {
      const xMid = cx + r - (i - 0.5) * seg;
      const xEnd = cx + r - i * seg;
      ctx.lineTo(xMid, baseY - dip);
      ctx.lineTo(xEnd, baseY);
    }
    ctx.closePath();
    ctx.fill();

    const eyeOffX = r * 0.36;
    const eyeOffY = -r * 0.12;
    const eyeR = r * 0.30;
    const pupilR = r * 0.14;
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(cx - eyeOffX, cy + eyeOffY, eyeR, 0, Math.PI * 2);
    ctx.arc(cx + eyeOffX, cy + eyeOffY, eyeR, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#1a237e";
    const pdx = DX[g.dir] * (eyeR - pupilR);
    const pdy = DY[g.dir] * (eyeR - pupilR);
    ctx.beginPath();
    ctx.arc(cx - eyeOffX + pdx, cy + eyeOffY + pdy, pupilR, 0, Math.PI * 2);
    ctx.arc(cx + eyeOffX + pdx, cy + eyeOffY + pdy, pupilR, 0, Math.PI * 2);
    ctx.fill();
  };

  const STEP_MS = 200;
  let lastStep = 0;

  const animate = (now) => {
    if (!lastStep) lastStep = now;
    while (now - lastStep >= STEP_MS) { step(); lastStep += STEP_MS; }
    const interp = Math.min(1, (now - lastStep) / STEP_MS);

    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, 360, 360);
    drawWalls();
    drawDots();
    drawPac(interp);
    for (const g of ghosts) drawGhost(g, interp);
    requestAnimationFrame(animate);
  };

  reset();
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
