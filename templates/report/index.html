<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{title}}</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #101312; color: #f4f1e8; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  main { min-height: 100vh; padding: 42px 24px 88px; }
  article { margin: 0 auto; max-width: 74ch; }
  article.w-narrow { max-width: 58ch; }
  article.w-wide { max-width: 98ch; }
  header { border-bottom: 1px solid rgba(244, 241, 232, 0.16); margin-bottom: 28px; padding-bottom: 24px; }
  h1 { margin: 0; font-size: clamp(2rem, 4vw, 4.4rem); line-height: 0.98; letter-spacing: 0; }
  .subtitle { margin: 14px 0 0; color: rgba(244, 241, 232, 0.66); font-size: 1rem; line-height: 1.5; }
  .summary { margin: 0 0 30px; padding: 18px 20px; border: 1px solid rgba(128, 197, 156, 0.36); background: rgba(128, 197, 156, 0.09); border-radius: 8px; }
  .summary:empty { display: none; }
  .summary > :first-child, .body > :first-child { margin-top: 0; }
  .summary > :last-child, .body > :last-child { margin-bottom: 0; }
  .body { font-size: 1.04rem; line-height: 1.72; }
  h2, h3, h4 { line-height: 1.25; letter-spacing: 0; margin: 1.55em 0 0.55em; }
  h2 { font-size: 1.55rem; border-bottom: 1px solid rgba(244, 241, 232, 0.12); padding-bottom: 0.3em; }
  h3 { font-size: 1.18rem; }
  p, ul, ol, blockquote, pre, table { margin: 0.82em 0; }
  a { color: #9bc4ff; }
  code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; background: rgba(255, 255, 255, 0.08); border-radius: 4px; padding: 0.12em 0.32em; }
  pre { overflow-x: auto; padding: 14px 16px; border-radius: 8px; background: rgba(0, 0, 0, 0.24); border: 1px solid rgba(244, 241, 232, 0.1); }
  pre code { background: transparent; padding: 0; }
  blockquote { border-left: 3px solid rgba(128, 197, 156, 0.7); color: rgba(244, 241, 232, 0.78); padding-left: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 0.94rem; }
  th, td { border-bottom: 1px solid rgba(244, 241, 232, 0.12); padding: 8px 10px; text-align: left; vertical-align: top; }
</style>
</head>
<body>
<main>
  <article id="report">
    <header>
      <h1>{{title}}</h1>
      <p class="subtitle">{{subtitle}}</p>
    </header>
    <section class="summary">{{{summary}}}</section>
    <section class="body">{{{body_md}}}</section>
  </article>
</main>
<script>
  const width = (window.__TEMPLATE_PARAMS && window.__TEMPLATE_PARAMS.width) || "default";
  const article = document.getElementById("report");
  if (["narrow", "wide"].includes(width)) article.classList.add("w-" + width);
  const subtitle = document.querySelector(".subtitle");
  if (!subtitle.textContent.trim()) subtitle.remove();
</script>
</body>
</html>
