<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Board</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: #0a0a0a;
    color: #ededec;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
  }
  .bar {
    flex: none;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding: 20px 26px 14px;
    border-bottom: 1px solid rgba(255,255,255,.08);
  }
  .title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: rgba(237,237,236,.52);
  }
  .count { font-size: 12px; color: rgba(237,237,236,.34); }

  .grid {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    padding: 22px 26px;
    align-content: start;
  }
  .section {
    background: rgba(18,20,28,.8);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: opacity .3s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .section.linked { cursor: pointer; }
  .section.linked:hover { border-color: rgba(255,255,255,.28); box-shadow: 0 0 26px rgba(255,255,255,.06); }
  .section.stale { opacity: .4; }
  .head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .name { font-size: 17px; font-weight: 650; letter-spacing: -.01em; overflow-wrap: anywhere; }
  .time { font-size: 12px; color: rgba(237,237,236,.52); white-space: nowrap; }
  .status { font-size: 15px; line-height: 1.45; color: rgba(237,237,236,.92); overflow-wrap: anywhere; }
  .detail { font-size: 13px; line-height: 1.5; color: rgba(237,237,236,.52); overflow-wrap: anywhere; }
  .foot { display: flex; align-items: center; gap: 8px; margin-top: 2px; flex-wrap: wrap; }
  .project {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 11px;
    color: rgba(237,237,236,.62);
    border: 1px solid rgba(255,255,255,.1);
    background: rgba(255,255,255,.04);
    border-radius: 6px;
    padding: 2px 7px;
  }
  .tag-stale {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: rgba(237,237,236,.52);
  }
  .go { margin-left: auto; font-size: 13px; color: rgba(237,237,236,.4); white-space: nowrap; }

  .empty {
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 40px;
    text-align: center;
  }
  .empty-head { font-size: 20px; font-weight: 600; color: rgba(237,237,236,.85); }
  .empty-sub { margin: 0; font-size: 14px; color: rgba(237,237,236,.52); }
  .empty-code {
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
    line-height: 1.6;
    color: rgba(237,237,236,.78);
    background: rgba(18,20,28,.8);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 10px;
    padding: 12px 16px;
    max-width: 680px;
    overflow-wrap: anywhere;
    text-align: left;
  }
</style>
</head>
<body>
  <header class="bar">
    <span class="title">{{title}}</span>
    <span class="count" id="count"></span>
  </header>
  <main class="grid" id="grid"></main>
  <div class="empty" id="empty">
    <div class="empty-head">Nothing on the board yet</div>
    <p class="empty-sub">Agents post their status with</p>
    <code class="empty-code">surface set board &lt;your-agent-name&gt; '{"status":"what I am doing","project":"myapp","link":"surface-id"}'</code>
  </div>

  <script>
  (function () {
    function init() {
      var Surface = window.Surface || {
        state: {},
        onState: function () { return function () {}; },
        action: function () { return Promise.resolve(); }
      };
      var P = window.__TEMPLATE_PARAMS || {};
      var staleMin = Number(P.stale_after_min);
      if (!isFinite(staleMin)) staleMin = 30;

      var grid = document.getElementById("grid");
      var empty = document.getElementById("empty");
      var count = document.getElementById("count");

      function isObj(v) { return typeof v === "object" && v !== null && !Array.isArray(v); }

      function el(tag, cls, text) {
        var n = document.createElement(tag);
        n.className = cls;
        if (text != null) n.textContent = text;
        return n;
      }

      function relTime(diffMs) {
        var s = Math.max(0, diffMs / 1000);
        if (s < 45) return "just now";
        var m = Math.max(1, Math.floor(s / 60));
        if (m < 60) return m + "m ago";
        var h = Math.floor(m / 60);
        if (h < 24) return h + "h ago";
        return Math.floor(h / 24) + "d ago";
      }

      function render() {
        var st = Surface.state || {};
        var now = Date.now();
        var entries = [];
        for (var k in st) {
          if (Object.prototype.hasOwnProperty.call(st, k) && isObj(st[k])) {
            entries.push({ name: k, info: st[k] });
          }
        }
        entries.sort(function (a, b) {
          return (Date.parse(b.info.updated_at) || 0) - (Date.parse(a.info.updated_at) || 0);
        });

        count.textContent = entries.length
          ? entries.length + (entries.length === 1 ? " agent" : " agents")
          : "";

        if (!entries.length) {
          grid.style.display = "none";
          empty.style.display = "flex";
          return;
        }
        grid.style.display = "";
        empty.style.display = "none";
        grid.innerHTML = "";

        entries.forEach(function (e) {
          var t = Date.parse(e.info.updated_at);
          var stale = isFinite(t) && (now - t) > staleMin * 60000;

          var card = el("div", "section" + (stale ? " stale" : ""));
          var head = el("div", "head");
          head.appendChild(el("div", "name", e.name));
          head.appendChild(el("div", "time", isFinite(t) ? relTime(now - t) : ""));
          card.appendChild(head);

          if (e.info.status != null) card.appendChild(el("div", "status", String(e.info.status)));
          if (e.info.detail) card.appendChild(el("div", "detail", String(e.info.detail)));

          var foot = el("div", "foot");
          if (e.info.project) foot.appendChild(el("span", "project", String(e.info.project)));
          if (stale) foot.appendChild(el("span", "tag-stale", "stale"));
          if (e.info.link) foot.appendChild(el("span", "go", "open →"));
          if (foot.childNodes.length) card.appendChild(foot);

          if (e.info.link) {
            var link = String(e.info.link);
            card.classList.add("linked");
            card.addEventListener("click", function () {
              Surface.action("open_section", { link: link });
              try {
                parent.postMessage({ type: "surface_navigate", surface_id: link }, "*");
              } catch (err) {}
            });
          }
          grid.appendChild(card);
        });
      }

      Surface.onState(function () { render(); });
      render();
      setInterval(render, 30000);
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  })();
  </script>
</body>
</html>
