<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ask Approval Demo</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0e1211; color: #f4f1e8; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
  main { width: min(760px, calc(100vw - 32px)); border: 1px solid rgba(244,241,232,.16); border-radius: 8px; padding: 28px; background: rgba(255,255,255,.04); }
  .eyebrow { color: #83d4a1; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; }
  h1 { margin: 12px 0 10px; font-size: clamp(30px, 7vw, 68px); line-height: .95; letter-spacing: 0; }
  p { color: rgba(244,241,232,.7); line-height: 1.55; }
  .options { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin: 28px 0; }
  button { min-height: 48px; border: 1px solid rgba(244,241,232,.24); border-radius: 6px; background: rgba(244,241,232,.08); color: #f4f1e8; font: inherit; cursor: pointer; }
  button.active, button:hover { border-color: #83d4a1; background: rgba(131,212,161,.16); }
  .submit { width: 100%; background: #83d4a1; color: #0e1211; font-weight: 800; }
  .status { min-height: 22px; color: #d8c179; }
</style>
</head>
<body>
<main>
  <div class="eyebrow">surface ask</div>
  <h1>Ship the deploy?</h1>
  <p>The user picks a choice, the surface emits one action, and the agent wakes through the delivery ladder.</p>
  <section class="options" aria-label="deploy choices">
    <button data-choice="ship">Ship</button>
    <button data-choice="hold">Hold</button>
    <button data-choice="notes">Need notes</button>
  </section>
  <button class="submit">Send answer</button>
  <p class="status" data-surface-bind="answer.choice">Waiting for a choice.</p>
</main>
<script>
  let choice = "ship";
  const status = document.querySelector(".status");
  const buttons = Array.from(document.querySelectorAll("[data-choice]"));
  function paint() {
    buttons.forEach((button) => button.classList.toggle("active", button.dataset.choice === choice));
    status.textContent = "Selected: " + choice;
  }
  buttons.forEach((button) => button.addEventListener("click", () => {
    choice = button.dataset.choice;
    paint();
  }));
  document.querySelector(".submit").addEventListener("click", async () => {
    const payload = { choice, ts: Date.now() };
    if (window.Surface && Surface.action) await Surface.action("answer", payload);
    status.textContent = "Action emitted: " + JSON.stringify(payload);
  });
  paint();
</script>
</body>
</html>
